global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
    - "alert_rules.yml"

scrape_configs:

  # ---------------------------------------------------------------------------
  # PROMETHEUS SELF-MONITORING
  # ---------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus"
          group: "monitoring"
          description: "Prometheus server"

  # ---------------------------------------------------------------------------
  # NOTE: No node_exporter scrape job for Ansible-managed hosts.
  # All Ansible-managed hosts run Grafana Alloy, which pushes metrics
  # directly to Prometheus via remote_write. No pull targets needed.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # STORAGE - TrueNAS (pull-based, node_exporter via Portainer)
  # VLAN 50 IP (192.168.50.33) - reachable from monitoring host.
  # ZFS pool / SMART health is alerted by TrueNAS native email alerts,
  # not Prometheus. This scrape feeds dashboards plus reachability,
  # CPU, and ARC-aware memory alerting only.
  # ---------------------------------------------------------------------------
  - job_name: "truenas"
    static_configs:
      - targets: ["truenas.louielab.cc:9100"]
        labels:
          instance: "truenas"
          group: "storage"
          description: "TrueNAS SCALE 25.10 - primary NAS"

  # ---------------------------------------------------------------------------
  # STORAGE - Synology (dashboards only; alerting handled by Synology
  # Active Insight, per design decision 2026-07-05)
  # ---------------------------------------------------------------------------
  - job_name: "synology"
    static_configs:
      - targets: ["synology.louielab.cc:9100"]
        labels:
          instance: "synology"
          group: "storage"
          description: "Synology DS-1621+ - wife-critical storage"

  # ---------------------------------------------------------------------------
  # NETWORK - pfSense (pull-based, node_exporter package)
  # Bare-metal Hunsn N100 appliance. Dashboards only; no alerting on
  # pfSense by design (total failure self-announces via dead internet).
  # ---------------------------------------------------------------------------
  - job_name: "pfsense"
    static_configs:
      - targets: ["192.168.51.1:9100"]
        labels:
          instance: "pfsense"
          group: "network"
          description: "pfSense firewall/router - bare metal Hunsn N100"

  # ---------------------------------------------------------------------------
  # NETWORK - QNAP Switch (pull-based, SNMP via snmp_exporter)
  # snmp-exporter runs on backup.louielab.cc (docker-compose)
  # ---------------------------------------------------------------------------
  - job_name: "qnap_switch"
    metrics_path: /snmp
    params:
      module: [if_mib]
      auth: [metrics_v2]
    static_configs:
      - targets: ["192.168.1.10"]
        labels:
          instance: "qnap-switch"
          group: "network"
          description: "QNAP QSW-M3216R-8S8T - 10GbE backbone"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: backup.louielab.cc:9116

  # ---------------------------------------------------------------------------
  # NOTE: PBS ships metrics/logs via Alloy (push). PBS-native backup job
  # monitoring deferred pending TrueNAS Incus deprecation / PBS rebuild.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # CADVISOR - See deploy-docker-metrics.yml.
  # ---------------------------------------------------------------------------
  - job_name: "cadvisor-backup"
    static_configs:
      - targets: ["backup.louielab.cc:8080"]
        labels:
          instance: "backup"
          group: "docker"
          description: "Docker containers - monitoring host"

  - job_name: 'cadvisor-docker'
    static_configs:
      - targets: ['docker.louielab.cc:8083']
        labels:
          instance: 'docker'

  - job_name: 'cadvisor-docker-gpu'
    static_configs:
      - targets: ['docker-gpu.louielab.cc:8083']
        labels:
          instance: 'docker-gpu'

  # ---------------------------------------------------------------------------
  # GPU - NVIDIA telemetry on docker-gpu (RTX 2000 Ada)
  # Dashboards only, no alerts. nvidia_gpu_exporter container on 9835.
  # ---------------------------------------------------------------------------
  - job_name: "nvidia_gpu"
    static_configs:
      - targets: ["docker-gpu.louielab.cc:9835"]
        labels:
          instance: "docker-gpu"
          group: "gpu"
          description: "RTX 2000 Ada - Ollama workloads"

  # ---------------------------------------------------------------------------
  # BLACKBOX - ICMP ping probes
  # ---------------------------------------------------------------------------
  - job_name: "blackbox_icmp"
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 1.1.1.1
          - 1.0.0.1
        labels:
          group: "cloudflare"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115

  # ---------------------------------------------------------------------------
  # BLACKBOX - HTTP website availability probes
  # ---------------------------------------------------------------------------
  - job_name: "blackbox_http"
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://www.leeannperugini.com/privacy-policy/
        labels:
          group: "web"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115
  # ---------------------------------------------------------------------------
  # NUT - Network UPS Tools (UPS telemetry)
  # ---------------------------------------------------------------------------
  - job_name: 'nut'
    metrics_path: /nut
    static_configs:
      - targets: ['192.168.3.4:3493']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: instance
        replacement: pve-01
      - target_label: __address__
        replacement: nut-exporter:9995
