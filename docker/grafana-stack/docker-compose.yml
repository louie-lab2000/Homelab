services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-remote-write-receiver        # Required for Alloy push
      - --web.enable-lifecycle                    # Required for hot-reload via /-/reload
    volumes:
      - /home/louie/grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/louie/grafana/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - type: volume
        source: prometheus_data
        target: /prometheus
        volume:
          nocopy: true
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - /home/louie/grafana/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - type: volume
        source: alertmanager_data
        target: /alertmanager
        volume:
          nocopy: true
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: "-config.file=/etc/loki/config.yml"
    volumes:
      - /home/louie/grafana/loki-config.yml:/etc/loki/config.yml:ro
      - type: volume
        source: loki_data
        target: /loki
        volume:
          nocopy: true
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.louielab.cc
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - type: volume
        source: grafana_data
        target: /var/lib/grafana
        volume:
          nocopy: true
    depends_on:
      - prometheus
      - loki
      - alertmanager
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116"
    volumes:
      - /home/louie/grafana/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml

volumes:
  alertmanager_data:
    driver: local
    driver_opts:
      type: nfs
      o: "vers=4.1,addr=192.168.3.33,nconnect=4,noatime,timeo=300"
      device: ":/mnt/fast/grafana/alertmanager"
  prometheus_data:
    driver: local
    driver_opts:
      type: nfs
      o: "vers=4.1,addr=192.168.3.33,nconnect=4,noatime,timeo=300"
      device: ":/mnt/fast/grafana/prometheus"
  loki_data:
    driver: local
    driver_opts:
      type: nfs
      o: "vers=4.1,addr=192.168.3.33,nconnect=4,noatime,timeo=300"
      device: ":/mnt/fast/grafana/loki"
  grafana_data:
    driver: local
    driver_opts:
      type: nfs
      o: "vers=4.1,addr=192.168.3.33,nconnect=4,noatime,timeo=300"
      device: ":/mnt/fast/grafana/data"
