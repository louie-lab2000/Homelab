# inventory/hosts.yml — louielab fleet, single source of truth
# Control node: backup.louielab.cc
#
# POWER NOTE: pve-10 is a warm standby, usually powered OFF overnight.
# When pve-10 is down, expect exactly these 7 unreachables in cron runs:
#   pve-10, node-1/2/3, pihole, test.leeannperugini.com, www.designs-by-leeann.com

all:
  children:
    proxmox:
      hosts:
        pve-01.louielab.cc:
        pve-10.louielab.cc:

    docker_hosts:
      hosts:
        docker.louielab.cc:
        docker-gpu.louielab.cc:

    web:
      hosts:
        forum.louiecloud.com:
        blog2.louielab.cc:
        www.leeannperugini.com:
        test.leeannperugini.com:
        www.designs-by-leeann.com:

    # NOTE: k3s nodes are ALSO defined in ~/ansible/k3s/inventory/hosts.yml
    # for cluster lifecycle operations — keep both in sync if nodes change.
    k3s:
      hosts:
        node-1:
          ansible_host: 192.168.50.41
        node-2:
          ansible_host: 192.168.50.42
        node-3:
          ansible_host: 192.168.50.43

    infra:
      hosts:
        backup.louielab.cc:
          ansible_connection: local

    lxc:
      hosts:
        cloudflared.louielab.cc:
        crowdsec.louielab.cc:
        pihole.louielab.cc:
        pbs.louielab.cc:

    wordpress:
      hosts:
        www.leeannperugini.com:
